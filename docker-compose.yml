services:
  core:
    build: 
      context: ./core
      dockerfile: Dockerfile
    container_name: core_harness
    # Run as the unprivileged "node" user (uid 1000) so files the agent creates in the
    # mounted volumes are owned by the host user, not root.
    user: "node"
    volumes:
      - ./data/pi:/app/.pi:rw
      - ./data/storage:/app/storage:rw
      - ./data/secrets:/app/secrets:rw
      # pi discovers skills under its config dir; mount the tracked skills/ there
      - ./skills:/app/.pi/skills:ro
      # Scheduler script (its main process; see command: below)
      - ./core/scheduler:/app/scheduler:ro
    env_file:
      - .env
    environment:
      # Use the mounted .pi dir as pi's config dir (models.json, SYSTEM.md, skills/).
      # The local LLM is configured as a provider in data/pi/models.json,
      # which points at http://llm:8080/v1 (the compose service name).
      - PI_CODING_AGENT_DIR=/app/.pi
      # Local timezone so scheduled "07:00" jobs fire at local time. Change as needed.
      - TZ=Europe/Berlin
    # Run the scheduler as the main process: it keeps the container alive AND fires
    # scheduled jobs. Interactive use (`core.sh` → docker exec pi) runs alongside it.
    command: ["node", "/app/scheduler/scheduler.mjs"]
    networks:
      - core_network
    depends_on:
      # Wait until the model is actually loaded and serving, not just the container started.
      llm:
        condition: service_healthy

  bot:
    # OPTIONAL Telegram bridge — chat with Core from your phone. Core runs fine without it.
    # Opt-in via its profile so a plain `docker compose up` (and core.sh) does NOT start it:
    #   docker compose --profile telegram up -d bot
    # Reuses the core image (has pi + tooling); just runs the bridge script instead.
    profiles: ["telegram"]
    build:
      context: ./core
      dockerfile: Dockerfile
    container_name: core_bot
    user: "node"
    volumes:
      - ./data/pi:/app/.pi:rw
      - ./data/storage:/app/storage:rw
      - ./data/secrets:/app/secrets:rw
      - ./skills:/app/.pi/skills:ro
      - ./core/bot/bot.mjs:/app/bot/bot.mjs:ro
    env_file:
      - .env
    environment:
      - PI_CODING_AGENT_DIR=/app/.pi
      - TZ=Europe/Berlin
    command: ["node", "/app/bot/bot.mjs"]
    networks:
      - core_network
    depends_on:
      llm:
        condition: service_healthy

  llm:
    # Pinned by digest (the working :server-cuda image) for reproducible rebuilds.
    image: ghcr.io/ggml-org/llama.cpp@sha256:841b199aed2649a748875b043b32fed2e8c2d4d87e1d563556817fb7fa44b72b
    container_name: local_llm
    ports:
      - "8080:8080"
    volumes:
      - ./data/models:/models:ro
    # Override the image healthcheck timings: allow generous start_period for the large
    # model to load before health checks count against it.
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_MODEL=/models/gemma-4-12b-it-Q4_K_M.gguf
      # Multimodal projector (Gemma 4 is encoder-free; the vision/audio tower ships
      # separately). With this set, /props reports "vision":true and the OpenAI API
      # accepts image_url content parts. ~175MB, offloaded to GPU alongside the model.
      - LLAMA_ARG_MMPROJ=/models/mmproj-BF16.gguf
      # Fixed alias so /v1/models reports a stable id that models.json can target
      - LLAMA_ARG_ALIAS=local-model
      # Enable Jinja chat-template + tool-call parsing (required for OpenAI tool calling)
      - LLAMA_ARG_JINJA=1
      # Core has SEVERAL concurrent agent clients sharing this server — the interactive
      # core.sh session, the Telegram bot, and the scheduler. Give it a slot per client (3)
      # so they don't contend/stall on a single slot (the original 1-slot setup starved them).
      - LLAMA_ARG_N_PARALLEL=3
      # CTX_SIZE is the TOTAL context, split across the slots: 49152 / 3 = 16384 per slot
      # (== models.json contextWindow). Same total KV/VRAM as the old single 49152 slot.
      - LLAMA_ARG_CTX_SIZE=49152
      - LLAMA_ARG_N_GPU_LAYERS=-1
      # Performance: force Flash Attention (faster + less KV memory at 24K ctx).
      - LLAMA_ARG_FLASH_ATTN=on
      # Cap Qwen3 thinking: bounds runaway <think> traces while leaving ample room for
      # genuine multi-step reasoning. -1=unlimited, 0=off, N=token budget.
      - LLAMA_ARG_THINK_BUDGET=1024
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - core_network

  llm-util:
    # Small, fast "utility" model for context work — distilling fat prose tool output and
    # summarizing for compaction — so those calls stay quick and don't compete with the main
    # model. Internal-only (no host port); reached by the context-saver extension at
    # http://llm-util:8080. Same pinned llama.cpp image; no tools/vision needed.
    image: ghcr.io/ggml-org/llama.cpp@sha256:841b199aed2649a748875b043b32fed2e8c2d4d87e1d563556817fb7fa44b72b
    container_name: local_llm_util
    volumes:
      - ./data/models:/models:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    environment:
      - LLAMA_ARG_HOST=0.0.0.0
      - LLAMA_ARG_MODEL=/models/Llama-3.2-3B-Instruct-Q4_K_M.gguf
      - LLAMA_ARG_ALIAS=util-model
      # Apply the model's chat template correctly for /v1/chat/completions.
      - LLAMA_ARG_JINJA=1
      # Enough to hold a fat tool output (a long page/transcript) plus prompt + summary.
      - LLAMA_ARG_CTX_SIZE=16384
      - LLAMA_ARG_N_GPU_LAYERS=-1
      - LLAMA_ARG_FLASH_ATTN=on
      - LLAMA_ARG_N_PARALLEL=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - core_network

  searxng:
    # Self-hosted metasearch for the websearch skill. Internal-only (no host port) —
    # reachable by core/ui at http://searxng:8080. Pinned by digest for reproducibility.
    # No own index: it aggregates upstream engines and exposes a private JSON API.
    image: searxng/searxng@sha256:8f1e32b1013b1e74a9b769686edbca03ff5439395743725f3f18369b4841f709
    container_name: core_searxng
    volumes:
      # settings.yml enables the JSON API; the secret comes from SEARXNG_SECRET (.env).
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_SECRET=${SEARXNG_SECRET:?set SEARXNG_SECRET in .env (openssl rand -hex 32)}
      - SEARXNG_BASE_URL=http://searxng:8080/
    networks:
      - core_network

networks:
  core_network:
    driver: bridge
