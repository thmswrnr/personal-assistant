<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Core</title>
  <style>
    :root {
      --bg:#f6f7f9; --panel:#ffffff; --line:#dfe3ea; --fg:#1a1d23; --muted:#5c6470;
      --accent:#2f6fed; --user-bg:#d7e6ff; --user-fg:#10243f;
    }
    * { box-sizing: border-box; }
    body { margin:0; font:14px/1.5 system-ui,sans-serif; background:var(--bg); color:var(--fg);
           height:100vh; display:grid; grid-template-columns: 1fr 340px; }
    header { grid-column:1/3; display:flex; align-items:center; gap:12px; padding:10px 16px;
             border-bottom:1px solid var(--line); }
    header h1 { font-size:16px; margin:0; }
    #status { font-size:12px; color:var(--muted); margin-left:auto; }
    #reset { background:transparent; border:1px solid var(--line); color:var(--fg); padding:5px 10px;
             border-radius:8px; font-size:13px; font-weight:500; cursor:pointer; }
    .dot { display:inline-block; width:8px; height:8px; border-radius:50%; background:#888; margin-right:5px; }
    .dot.ok { background:#3fb950; } .dot.bad { background:#f85149; }

    /* chat */
    main { display:flex; flex-direction:column; min-height:0; }
    #log { flex:1; overflow-y:auto; padding:16px; display:flex; flex-direction:column; gap:12px; }
    .msg { max-width:80%; padding:9px 12px; border-radius:10px; white-space:pre-wrap; word-wrap:break-word; }
    .msg.user { align-self:flex-end; background:var(--user-bg); color:var(--user-fg); }
    .msg .att { display:block; max-width:220px; max-height:220px; border-radius:8px; margin-bottom:6px; }
    .msg.bot { align-self:flex-start; background:var(--panel); border:1px solid var(--line); }
    .msg.bot .tool { color:var(--muted); font-size:12px; font-style:italic; }
    .think-wrap { margin-bottom:6px; }
    .think-wrap summary { color:var(--muted); font-size:12px; cursor:pointer; }
    .think { color:var(--muted); font-size:12px; font-style:italic; white-space:pre-wrap;
             max-height:180px; overflow-y:auto; margin-top:6px; padding-left:8px;
             border-left:2px solid var(--line); }
    form { display:flex; gap:8px; padding:12px 16px; border-top:1px solid var(--line); align-items:center; }
    #q { flex:1; padding:9px 12px; background:var(--panel); border:1px solid var(--line); border-radius:8px; color:var(--fg); }
    button { padding:9px 14px; background:var(--accent); border:0; border-radius:8px; color:#fff; font-weight:600; cursor:pointer; }
    button:disabled { opacity:.5; cursor:default; }
    #attach { background:transparent; border:1px solid var(--line); color:var(--fg); padding:9px 11px; font-size:15px; }
    main.drag { outline:2px dashed var(--accent); outline-offset:-6px; }
    /* attachment preview chip */
    #attachbar { padding:0 16px; }
    #attachbar:not(:empty) { padding:8px 16px 0; }
    .chip { display:inline-flex; align-items:center; gap:8px; background:var(--panel);
            border:1px solid var(--line); border-radius:8px; padding:5px 8px; font-size:12px; }
    .chip img { width:32px; height:32px; object-fit:cover; border-radius:4px; }
    .chip button { background:transparent; color:var(--muted); border:0; padding:0 4px; font-weight:700; }

    /* sidebar */
    aside { border-left:1px solid var(--line); overflow-y:auto; padding:14px; display:flex; flex-direction:column; gap:16px; }
    .card { background:var(--panel); border:1px solid var(--line); border-radius:10px; padding:12px; }
    .card h2 { font-size:12px; text-transform:uppercase; letter-spacing:.05em; color:var(--muted); margin:0 0 8px; }
    .actions { display:flex; gap:8px; flex-wrap:wrap; }
    .actions button { background:transparent; color:var(--fg); border:1px solid var(--line); font-weight:500; }
    .note { white-space:pre-wrap; word-wrap:break-word; font-size:12.5px; margin:0; color:var(--fg);
            border-top:1px solid var(--line); padding-top:8px; margin-top:8px; }
    .note:first-child { border-top:0; padding-top:0; margin-top:0; }
    .note b { color:var(--accent); font-weight:600; }
    .todo { font-size:13px; padding:2px 0; }
    .todo.done { color:var(--muted); text-decoration:line-through; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <h1>Core</h1>
    <span id="status"><span class="dot"></span>connecting…</span>
    <button id="reset" title="Clear the conversation (keeps it fast)">New chat</button>
  </header>

  <main>
    <div id="log"></div>
    <div id="attachbar"></div>
    <form id="chat">
      <input type="file" id="file" accept="image/*" hidden />
      <button type="button" id="attach" title="Attach an image (or paste / drag &amp; drop)">📎</button>
      <input id="q" autocomplete="off" placeholder="Ask Core… (e.g. check my email, or attach an image)" />
      <button id="send" type="submit">Send</button>
    </form>
  </main>

  <aside>
    <div class="card">
      <h2>Quick actions</h2>
      <div class="actions">
        <button data-cmd="/skill:morning-briefing">Morning briefing</button>
        <button data-cmd="/skill:process-inbox">Process inbox</button>
      </div>
    </div>
    <div class="card"><h2>Inbox</h2><div id="inbox" class="muted">…</div></div>
    <div class="card"><h2>Todos</h2><div id="todos" class="muted">…</div></div>
    <div class="card"><h2>Recent notes</h2><div id="notes" class="muted">…</div></div>
  </aside>

  <script src="app.js"></script>
</body>
</html>
